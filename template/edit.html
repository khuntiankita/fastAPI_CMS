<!DOCTYPE html>
<html lang="en">


{% include "header.html" %}

<body>

     <div class="account-pages pt-2 pt-sm-5 pb-4 pb-sm-5">
          <div class="container">
               <div class="row justify-content-center">
                    <div class="col-xl-5">
                         <div class="card auth-card">
                              <div class="card-body">
                                   <div class="p-3">
                        

                                        <div class="text-center">
                                             <h3 class="fw-bold text-dark fs-20">Edit  🖋️</h3>
                                             <p class="text-muted mt-1 mb-4"></p>
                                        </div>
                                        <div class="p-3">
                                             {% for dt in contact %}
                                             <form action="/update_data/{{ dt.id }}" method="post" class="authentication-form">
                                                  <div class="mb-4">
                                                       <label class="form-label" for="name">Name</label>
                                                       <div class="position-relative w-100">
                                                            <input type="text" class="form-control form-control-lg rounded" value="{{dt.name}}" id="name" name="name" placeholder="Enter Name" required="">
                                                            <p class="text-muted p-0 position-absolute end-0 top-50 border-0 fs-4 translate-middle-y me-2 mb-0">                                                            </p>
                                                       </div>
                                                  </div>
                                                    <div class="mb-4">
                                                    <label class="form-label" for="lastname">Last Name</label>
                                                    <div class="position-relative w-100">
                                                         <input type="text" class="form-control form-control-lg rounded" id="lastname" value="{{dt.lastname}}"  name="lastname" placeholder="Enter Last Name" required="">
                                                         <p class="text-muted p-0 position-absolute end-0 top-50 border-0 fs-4 translate-middle-y me-2 mb-0">
                                                       </p>
                                                    </div>
                                               </div>
                                                  <div class="mb-4">
                                                       <label class="form-label" for="mobile_name">Mobile Number</label>
                                                       <div class="position-relative w-100">
                                                            <input type="password" class="form-control form-control-lg rounded" id="mobile_number" value="{{dt.mobile_number}}"  name="mobile_number" placeholder="Enter Mobile Number" required="">
                                                       </div>
                                                  </div>
                      
                                                  <div class="text-center d-grid">
                                                       <button class="btn btn-primary d-flex align-items-center justify-content-center gap-1 fw-medium" type="submit">Update</button>
                                                  </div>
                                             </form>
                                             {% endfor %}
                                        </div>

                                   </div> <!-- end col -->
                              </div> <!-- end card-body -->
                         </div> <!-- end card -->
                    </div> <!-- end col -->
               </div> <!-- end row -->
          </div>
     </div>

     <script src="assets/js/vendor.js"></script>
     <script src="assets/js/app.js"></script>


</body>

</html>
